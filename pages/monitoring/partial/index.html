    .hero h1 em{font-style:normal;color:var(--accent);}
    .container{max-width:900px;margin:0 auto;padding:2rem;}
    .section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:2rem;}
    .section h2{font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:1rem;}
    .section p{color:var(--text);margin-bottom:1rem;line-height:1.7;}
    .placeholder{text-align:center;padding:3rem;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:12px;}
    .placeholder-icon{font-size:3rem;margin-bottom:1rem;opacity:0.5;}
    footer{border-top:1px solid var(--border);text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem;margin-top:3rem;}
    footer a{color:var(--accent);text-decoration:none;}

</head>
